<svg width="360" height="80" viewBox="0 0 360 80" xmlns="http://www.w3.org/2000/svg">
<defs>
<filter id="g">
<feGaussianBlur stdDeviation="2.5" result="blur"/>
<feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>

<g transform="translate(4, 6)">
<!-- Hexagon icon -->
<g transform="translate(0, 0)">
<polygon points="30,0 57,16 57,48 30,64 3,48 3,16" fill="none" stroke="#7b2fff" stroke-width="1.8" filter="url(#g)"/>
<polygon points="30,10 48,21 48,43 30,54 12,43 12,21" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
<g fill="#00ff88">
<rect x="16" y="20" width="4" height="20" rx="0.5"/>
<rect x="20" y="20" width="4" height="4" rx="0.5"/>
<rect x="24" y="24" width="4" height="4" rx="0.5"/>
<rect x="28" y="28" width="4" height="4" rx="0.5"/>
<rect x="32" y="24" width="4" height="4" rx="0.5"/>
<rect x="36" y="20" width="4" height="4" rx="0.5"/>
<rect x="40" y="20" width="4" height="20" rx="0.5"/>
</g>
</g>

<!-- Text MAIAHUB -->
<text x="74" y="30" font-size="30" font-weight="700" font-family="monospace" letter-spacing="2">
<tspan fill="#00ff88" filter="url(#g)">MAIA</tspan><tspan fill="#7b2fff" filter="url(#g)">HUB</tspan>
</text>

<!-- Underline green to purple -->
<line x1="74" y1="40" x2="184" y2="40" stroke="#00ff88" stroke-width="2" opacity="0.9"/>
<line x1="184" y1="40" x2="230" y2="40" stroke="#3dbf94" stroke-width="2" opacity="0.9"/>
<line x1="230" y1="40" x2="270" y2="40" stroke="#5d7acc" stroke-width="2" opacity="0.9"/>
<line x1="270" y1="40" x2="310" y2="40" stroke="#7b2fff" stroke-width="2" opacity="0.9"/>

<!-- Subtitle -->
<text x="74" y="60" font-size="13" fill="#c8c8c8" font-family="monospace" letter-spacing="4">// STARLOG ARCHIVE</text>
</g>
</svg>